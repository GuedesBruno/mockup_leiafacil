<!-- Tela Inicial: /screens/_home.html -->
<div id="home-screen" class="screen view-active">
    <div class="home-content-wrapper">
        <div class="welcome-container">
            <h1>Bem-vindo ao Leia Fácil!</h1>
            <p>Seu digitalizador inteligente, multissensorial e multideficiência!</p>
        </div>

        <div class="home-unified-row">
            <!-- Perfil TDAH -->
            <button class="btn-preset" data-profile="tdah">
                <div class="icon"><img src="icones/icone_tdah.png" alt="Perfil para TDAH"></div>
                <span class="btn-preset-label">TDAH</span>
            </button>
            <!-- Perfil TEA -->
            <button class="btn-preset" data-profile="tea">
                <div class="icon"><img src="icones/icone_tea.png" alt="Perfil para TEA"></div>
                <span class="btn-preset-label">TEA</span>
            </button>
            <!-- Perfil Dislexia -->
            <button class="btn-preset" data-profile="dislexia">
                <div class="icon"><img src="icones/icone_dislexia.png" alt="Perfil para Dislexia"></div>
                <span class="btn-preset-label">Dislexia</span>
            </button>
            <!-- Perfil Baixa Visão -->
            <button class="btn-preset" data-profile="baixa_visao">
                <div class="icon"><img src="icones/icone_visual_olho.png" alt="Perfil Baixa Visão"></div>
                <span class="btn-preset-label">Baixa Visão</span>
            </button>  
            <!-- Perfil Cegueira -->
            <button class="btn-preset" data-profile="cegueira">
                <div class="icon"><img src="icones/icone_cegueira.png" alt="Perfil Cegueira"></div>
                <span class="btn-preset-label">Cegueira</span>
            </button>

            <div class="vertical-divider"></div>

            <!-- Perfil Imagem Real -->
            <button class="btn-preset" data-profile="padrao">
                <div class="icon"><img src="icones/icone_padrao.png" alt="Perfil Padrão"></div>
                <span class="btn-preset-label">Imagem Real</span>
            </button> 

            <div class="vertical-divider"></div>

            <!-- Perfil Usuário -->
            <div class="user-profile-wrapper">
                <button class="btn-preset" id="btn-home-usuario">
                    <div class="icon btn-user-dashed"><img src="icones/icone_perfil_mais.png" alt="Usuários"></div>
                    <span class="btn-preset-label">Usuário</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Botão Fechar - Canto Inferior Direito -->
    <button class="btn-close-app-bottom" title="Fechar Projeto">
        <img src="icones/icone_sair.png" alt="Fechar" onerror="this.style.display='none'">
    </button>
</div>
